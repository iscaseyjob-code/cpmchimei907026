        const INITIAL_POSTS = [];

        const ALL_VALID_MONTHS = [
          { value: "2026-06", label: "115 年 6 月" },
          { value: "2026-05", label: "115 年 5 月" },
          { value: "2026-04", label: "115 年 4 月" },

          { value: "2026-01", label: "115 年 1 月" },

          { value: "2025-03", label: "114 年 3 月" },
          { value: "2025-02", label: "114 年 2 月" },
          { value: "2025-01", label: "114 年 1 月" },
          { value: "2024-12", label: "113 年 12 月" },
          { value: "2024-11", label: "113 年 11 月" },
          { value: "2024-10", label: "113 年 10 月" }
        ];

        const STORAGE_KEYS = {
          posts: 'quality_cruise_posts_v1',
          isAdmin: 'quality_cruise_is_admin'
        };

        const openPersistedDatabase = () => new Promise((resolve, reject) => {
          if (!window.indexedDB) {
            reject(new Error('IndexedDB unavailable'));
            return;
          }

          const request = window.indexedDB.open('quality_cruise_posts_db', 1);
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains('appData')) {
              db.createObjectStore('appData', { keyPath: 'key' });
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });

        const savePersistedData = async (postsData, adminState) => {
          try {
            const db = await openPersistedDatabase();
            await new Promise((resolve, reject) => {
              const transaction = db.transaction('appData', 'readwrite');
              transaction.objectStore('appData').put({ key: 'posts', value: postsData });
              transaction.objectStore('appData').put({ key: 'isAdmin', value: adminState });
              transaction.oncomplete = () => resolve();
              transaction.onerror = () => reject(transaction.error);
            });
          } catch (error) {
            console.warn('Persisted storage save failed:', error);
          }
        };

        const clearPersistedData = async () => {
          try {
            localStorage.removeItem(STORAGE_KEYS.posts);
            localStorage.removeItem(STORAGE_KEYS.isAdmin);
          } catch (error) {
            console.warn('Local storage cleanup failed:', error);
          }

          try {
            const db = await openPersistedDatabase();
            await new Promise((resolve, reject) => {
              const transaction = db.transaction('appData', 'readwrite');
              transaction.objectStore('appData').delete('posts');
              transaction.objectStore('appData').delete('isAdmin');
              transaction.oncomplete = () => resolve();
              transaction.onerror = () => reject(transaction.error);
            });
          } catch (error) {
            console.warn('Persisted storage cleanup failed:', error);
          }
        };

        const loadPersistedData = async () => {
          try {
            const db = await openPersistedDatabase();
            return await new Promise((resolve, reject) => {
              const transaction = db.transaction('appData', 'readonly');
              const postsRequest = transaction.objectStore('appData').get('posts');
              const adminRequest = transaction.objectStore('appData').get('isAdmin');

              let postsValue = null;
              let adminValue = null;

              postsRequest.onsuccess = () => {
                postsValue = postsRequest.result?.value || null;
                if (adminRequest.readyState === 'done' || adminRequest.result !== undefined) {
                  resolve({ posts: postsValue, admin: adminValue });
                }
              };

              adminRequest.onsuccess = () => {
                adminValue = adminRequest.result?.value ?? null;
                if (postsRequest.readyState === 'done' || postsRequest.result !== undefined) {
                  resolve({ posts: postsValue, admin: adminValue });
                }
              };

              postsRequest.onerror = () => reject(postsRequest.error);
              adminRequest.onerror = () => reject(adminRequest.error);
            });
          } catch (error) {
            console.warn('Persisted storage load failed:', error);
            return { posts: null, admin: null };
          }
        };

        const getCategoryMeta = (category) => {
          const normalized = category || 'medical_quality';
          switch (normalized) {
            case 'patient_safety':
              return { value: 'patient_safety', label: '病人安全', icon: 'shield', badgeClass: 'bg-rose-600 text-white', tabIconClass: 'text-rose-500', chipClass: 'bg-rose-500/10 text-rose-700' };
            case 'team_daily':
              return { value: 'team_daily', label: '團隊日常', icon: 'coffee', badgeClass: 'bg-amber-500 text-white', tabIconClass: 'text-amber-500', chipClass: 'bg-amber-500/10 text-amber-700' };
            case 'life_piece':
              return { value: 'life_piece', label: '生活小品', icon: 'sparkles', badgeClass: 'bg-violet-600 text-white', tabIconClass: 'text-violet-500', chipClass: 'bg-violet-500/10 text-violet-700' };
            case 'professional':
            case 'medical_quality':
              return { value: 'medical_quality', label: '醫療品質', icon: 'trendingUp', badgeClass: 'bg-emerald-600 text-white', tabIconClass: 'text-emerald-500', chipClass: 'bg-emerald-500/10 text-emerald-700' };
            case 'daily':
              return { value: 'team_daily', label: '團隊日常', icon: 'coffee', badgeClass: 'bg-amber-500 text-white', tabIconClass: 'text-amber-500', chipClass: 'bg-amber-500/10 text-amber-700' };
            default:
              return { value: 'medical_quality', label: '醫療品質', icon: 'trendingUp', badgeClass: 'bg-emerald-600 text-white', tabIconClass: 'text-emerald-500', chipClass: 'bg-emerald-500/10 text-emerald-700' };
          }
        };

        function App() {
          const [posts, setPosts] = React.useState(() => {
            try {
              const saved = localStorage.getItem(STORAGE_KEYS.posts);
              if (!saved) return INITIAL_POSTS;
              const parsed = JSON.parse(saved);
              return Array.isArray(parsed) ? parsed : INITIAL_POSTS;
            } catch (e) {
              return INITIAL_POSTS;
            }
          });

          const [isAdmin, setIsAdmin] = React.useState(() => {
            try {
              const savedRole = localStorage.getItem(STORAGE_KEYS.isAdmin);
              return savedRole === 'true';
            } catch (e) {
              return false;
            }
          });

          const [storageReady, setStorageReady] = React.useState(false);
          const [selectedMonth, setSelectedMonth] = React.useState("2026-06");
          const [activeCategory, setActiveCategory] = React.useState("all");
          const [searchQuery, setSearchQuery] = React.useState("");
          const [selectedPost, setSelectedPost] = React.useState(null);
          const [theme, setTheme] = React.useState("warm");

          // Helper to count posts dynamically
          const getPostCountForMonth = (monthValue) => {
            return posts.filter(post => post.month === monthValue).length;
          };

          // Modals
          const [showCreateModal, setShowCreateModal] = React.useState(false);
          const [showManageModal, setShowManageModal] = React.useState(false);
          const [showLoginModal, setShowLoginModal] = React.useState(false);
          
          // Confirm Dialog state
          const [confirmDialog, setConfirmDialog] = React.useState({
            isOpen: false,
            title: "",
            message: "",
            onConfirm: null
          });

          const [editingPostId, setEditingPostId] = React.useState(null);
          const [toast, setToast] = React.useState({ show: false, message: "", type: "success" });

          const triggerToast = (message, type = "success") => {
            setToast({ show: true, message, type });
            setTimeout(() => {
              setToast(prev => ({ ...prev, show: false }));
            }, 3000);
          };

          React.useEffect(() => {
            const hydrateStorage = async () => {
              try {
                const persisted = await loadPersistedData();
                if (persisted.posts && Array.isArray(persisted.posts)) {
                  setPosts(persisted.posts);
                }
                if (typeof persisted.admin === 'boolean') {
                  setIsAdmin(persisted.admin);
                }

                if (navigator.storage?.persist) {
                  await navigator.storage.persist();
                }
              } catch (error) {
                console.warn('Storage hydration failed:', error);
              } finally {
                setStorageReady(true);
              }
            };

            hydrateStorage();
          }, []);

          React.useEffect(() => {
            if (!storageReady) return;
            localStorage.setItem(STORAGE_KEYS.posts, JSON.stringify(posts));
            savePersistedData(posts, isAdmin);
          }, [posts, isAdmin, storageReady]);

          React.useEffect(() => {
            if (!selectedPost) return;
            setPosts(prev => prev.map(post => post.id === selectedPost.id ? { ...post, views: (post.views || 0) + 1 } : post));
            setSelectedPost(prev => prev && prev.id === selectedPost.id ? { ...prev, views: (prev.views || 0) + 1 } : prev);
          }, [selectedPost?.id]);

          React.useEffect(() => {
            if (!storageReady) return;
            localStorage.setItem(STORAGE_KEYS.isAdmin, isAdmin ? 'true' : 'false');
          }, [isAdmin, storageReady]);

          // Form States
          const [newTitle, setNewTitle] = React.useState("");
          const [newCategory, setNewCategory] = React.useState("medical_quality");
          const [newAuthor, setNewAuthor] = React.useState("");
          const [newSummary, setNewSummary] = React.useState("");
          const [newContent, setNewContent] = React.useState("");
          const [newTags, setNewTags] = React.useState("");
          const [newCover, setNewCover] = React.useState("https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200&auto=format&fit=crop");
          const [newContentImages, setNewContentImages] = React.useState([]);
          const [newMonth, setNewMonth] = React.useState("2026-06");
          const [adminPasscode, setAdminPasscode] = React.useState("");
          const [importText, setImportText] = React.useState("");

          const fileToDataUrl = (file) => {
            return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.onerror = () => reject(new Error('圖片讀取失敗'));
              reader.readAsDataURL(file);
            });
          };

          const extractImageUrls = (content = "") => {
            const matches = content.matchAll(/!\[[^\]]*\]\(([^)]+)\)/g);
            return Array.from(matches, (match) => match[1].trim()).filter(Boolean);
          };

          const filteredPosts = React.useMemo(() => {
            return posts.filter(post => {
              const matchMonth = post.month === selectedMonth;
              const matchCategory = activeCategory === "all" || getCategoryMeta(post.category).value === activeCategory;
              const matchSearch = searchQuery.trim() === "" || 
                post.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                post.author.toLowerCase().includes(searchQuery.toLowerCase()) ||
                post.summary.toLowerCase().includes(searchQuery.toLowerCase()) ||
                post.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()));
              
              return matchMonth && matchCategory && matchSearch;
            });
          }, [posts, selectedMonth, activeCategory, searchQuery]);

          const otherPostsInMonth = React.useMemo(() => {
            if (!selectedPost) return [];
            return posts.filter(p => p.month === selectedPost.month && p.id !== selectedPost.id);
          }, [posts, selectedPost]);

          const handleLike = (postId, e) => {
            e.stopPropagation();
            setPosts(prev => prev.map(post => {
              if (post.id === postId) {
                return { ...post, likes: post.likes + 1 };
              }
              return post;
            }));
            if (selectedPost && selectedPost.id === postId) {
              setSelectedPost(prev => ({ ...prev, likes: prev.likes + 1 }));
            }
            triggerToast("感謝您的共鳴支持！ ❤️");
          };

          const openCreateModal = () => {
            setEditingPostId(null);
            setNewTitle("");
            setNewCategory("medical_quality");
            setNewAuthor("");
            setNewSummary("");
            setNewContent("");
            setNewTags("");
            setNewCover("https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200&auto=format&fit=crop");
            setNewContentImages([]);
            setNewMonth(selectedMonth);
            setShowCreateModal(true);
          };

          const openEditModal = (post, e) => {
            if (e) e.stopPropagation();
            setEditingPostId(post.id);
            setNewTitle(post.title);
            setNewCategory(getCategoryMeta(post.category).value);
            setNewAuthor(post.author);
            setNewSummary(post.summary);
            setNewContent(post.content);
            setNewTags(post.tags.join(', '));
            setNewCover(post.coverUrl);
            setNewContentImages(extractImageUrls(post.content));
            setNewMonth(post.month);
            setShowCreateModal(true);
          };

          const handleCreateOrEditPost = (e) => {

                          if (trimmed.startsWith('###')) {

                              <h3 key={index} className="text-2xl font-bold font-serif mt-8 mb-4 text-amber-700 dark:text-amber-400 border-l-4 border-amber-500 pl-3">
                                {trimmed.replace('###', '').trim()}
                              </h3>
                            );
                          }
                          if (trimmed.startsWith('-') || trimmed.startsWith('*')) {
                            const listItems = trimmed.split('\n').map(item => item.replace(/^[-*]\s*/, '').trim());
                            return (
                              <ul key={index} className="list-disc pl-6 my-4 space-y-2 text-base leading-relaxed opacity-95">

                          }
                          if (/^\d+\./.test(trimmed)) {

                            return (
                              <ol key={index} className="list-decimal pl-6 my-4 space-y-2 text-base leading-relaxed opacity-95">

                              </ol>
                            );

                            const imageMatches = [...trimmed.matchAll(/!\[([^\]]*)\]\(([^)]+)\)/g)];

                            </p>

                        <div className="flex justify-end gap-2">
                          <button type="button" onClick={() => {
                            const template = [{ id: Date.now(), title: "標題", category: "medical_quality", categoryLabel: "醫療品質", month: "2026-07", author: "作者", date: "2026.07.01", readTime: "5 min", coverUrl: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe", summary: "摘要", content: "### 標題\n內文", likes: 0, tags: ["標籤"] }];
                            setImportText(JSON.stringify(template, null, 2));
                          }} className="px-4 py-2 rounded-xl text-xs bg-stone-100 text-stone-700">產生範本</button>
                          <button type="submit" className="px-5 py-2 rounded-xl bg-amber-700 text-white text-xs font-bold flex items-center gap-1.5"><Icon name="upload" className="w-3.5 h-3.5" /> 匯入覆蓋資料</button>
                        </div>
                      </form>
                    </div>
                  </div>
                </div>
              )}

              {/* Login Modal */}
              {showLoginModal && (
                <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                  <div className={`relative max-w-sm w-full rounded-2xl p-6 shadow-2xl border ${themeClasses.modalBg}`}>
                    <div className="flex items-center justify-between mb-4 pb-3 border-b border-stone-200/20">
                      <div className="flex items-center space-x-2">
                        <Icon name="lock" className="w-5 h-5 text-amber-500" />
                        <h3 className="font-serif font-bold text-lg">後台維護者登入</h3>
                      </div>
                      <button onClick={() => { setShowLoginModal(false); setAdminPasscode(""); }} className="p-1 rounded-full hover:bg-stone-100"><Icon name="x" className="w-4 h-4" /></button>
                    </div>
                    <form onSubmit={handleAdminLogin} className="space-y-4">
                      <p className="text-xs opacity-60">輸入密碼： <code className="bg-stone-200 dark:bg-zinc-800 px-1 rounded">0000</code> 或 <code className="bg-stone-200 dark:bg-zinc-800 px-1 rounded">admin</code> 可解鎖編輯後台。</p>
                      <input type="password" required placeholder="請輸入密碼" value={adminPasscode} onChange={(e) => setAdminPasscode(e.target.value)} className={`w-full p-2.5 rounded-xl border focus:outline-none focus:ring-2 focus:ring-amber-500/30 ${themeClasses.inputBg}`} />
                      <button type="submit" className="w-full py-2.5 rounded-xl bg-amber-700 text-white font-semibold text-sm flex items-center justify-center gap-1.5"><Icon name="unlock" className="w-4 h-4" /> 登入並解鎖</button>
                    </form>
                  </div>
                </div>
              )}

              {/* Footer */}
              <footer className={`mt-20 py-12 border-t ${themeClasses.divider} opacity-80 text-center text-xs space-y-2`}>
                <p className="font-serif font-bold tracking-widest text-sm">品管巡航報 / 每一頁都是生活的詩</p>
                <div className="flex justify-center space-x-4 pt-4 text-stone-500">
                  {!isAdmin ? (
                    <span onClick={() => setShowLoginModal(true)} className="hover:text-amber-500 cursor-pointer flex items-center gap-1 text-xs font-semibold"><Icon name="lock" className="w-3.5 h-3.5" /> 管理者登入</span>
                  ) : (
                    <span onClick={handleAdminLogout} className="hover:text-rose-500 cursor-pointer flex items-center gap-1 text-xs font-semibold"><Icon name="unlock" className="w-3.5 h-3.5 text-emerald-500" /> 登出後台</span>
                  )}
                  <span>•</span>
                  <span className="hover:text-amber-500 cursor-pointer" onClick={() => triggerToast("系統由品管中心運營維護 🛰️")}>聯絡系統管理員</span>
                </div>
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
