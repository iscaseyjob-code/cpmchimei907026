                        <div className={`p-4 rounded-2xl ${theme === 'warm' ? 'bg-stone-100/50' : 'bg-zinc-900/50'} border border-dashed border-stone-200/60`}>
                          <h4 className="font-semibold text-sm mb-2 flex items-center gap-1.5"><Icon name="download" className="w-4 h-4 text-emerald-500" /> 導出 JSON 備份</h4>
                          <button onClick={handleExportData} className="w-full py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-xs font-semibold">下載備份檔案</button>
                        </div>
                        <div className={`p-4 rounded-2xl ${theme === 'warm' ? 'bg-stone-100/50' : 'bg-zinc-900/50'} border border-dashed border-stone-200/60`}>
                          <h4 className="font-semibold text-sm mb-2 flex items-center gap-1.5"><Icon name="alertCircle" className="w-4 h-4 text-rose-500" /> 還原預設值</h4>
                          <button onClick={handleRestoreDefault} className="w-full py-2 bg-rose-600/15 hover:bg-rose-600/25 text-rose-500 rounded-xl text-xs font-semibold border border-rose-600/30">恢復初始設定</button>
                        </div>
                      </div>

                      <form onSubmit={handleImportData} className="space-y-3">
                        <textarea rows={6} required placeholder="請貼上 JSON 陣列..." value={importText} onChange={(e) => setImportText(e.target.value)} className={`w-full p-3 rounded-xl border font-mono text-xs focus:outline-none focus:ring-2 focus:ring-amber-500/30 ${themeClasses.inputBg}`} />
                        <div className="flex justify-end gap-2">
                          <button type="button" onClick={() => {
                            const template = [{ id: Date.now(), title: "標題", category: "professional", categoryLabel: "專業分享", month: "2026-07", author: "作者", date: "2026.07.01", readTime: "5 min", coverUrl: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe", summary: "摘要", content: "### 標題\n內文", likes: 0, tags: ["標籤"] }];
                            setImportText(JSON.stringify(template, null, 2));
                          }} className="px-4 py-2 rounded-xl text-xs bg-stone-100 text-stone-700">產生範本</button>
                          <button type="submit" className="px-5 py-2 rounded-xl bg-amber-700 text-white text-xs font-bold flex items-center gap-1.5"><Icon name="upload" className="w-3.5 h-3.5" /> 匯入覆蓋資料</button>
                        </div>
                      </form>
                    </div>
                  </div>
                </div>
              )}

              {/* Login Modal */}
              {showLoginModal && (
                <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                  <div className={`relative max-w-sm w-full rounded-2xl p-6 shadow-2xl border ${themeClasses.modalBg}`}>
                    <div className="flex items-center justify-between mb-4 pb-3 border-b border-stone-200/20">
                      <div className="flex items-center space-x-2">
                        <Icon name="lock" className="w-5 h-5 text-amber-500" />
                        <h3 className="font-serif font-bold text-lg">後台維護者登入</h3>
                      </div>
                      <button onClick={() => { setShowLoginModal(false); setAdminPasscode(""); }} className="p-1 rounded-full hover:bg-stone-100"><Icon name="x" className="w-4 h-4" /></button>
                    </div>
                    <form onSubmit={handleAdminLogin} className="space-y-4">
                      <p className="text-xs opacity-60">輸入密碼： <code className="bg-stone-200 dark:bg-zinc-800 px-1 rounded">0000</code> 或 <code className="bg-stone-200 dark:bg-zinc-800 px-1 rounded">admin</code> 可解鎖編輯後台。</p>
                      <input type="password" required placeholder="請輸入密碼" value={adminPasscode} onChange={(e) => setAdminPasscode(e.target.value)} className={`w-full p-2.5 rounded-xl border focus:outline-none focus:ring-2 focus:ring-amber-500/30 ${themeClasses.inputBg}`} />
                      <button type="submit" className="w-full py-2.5 rounded-xl bg-amber-700 text-white font-semibold text-sm flex items-center justify-center gap-1.5"><Icon name="unlock" className="w-4 h-4" /> 登入並解鎖</button>
                    </form>
                  </div>
                </div>
              )}

              {/* Footer */}
              <footer className={`mt-20 py-12 border-t ${themeClasses.divider} opacity-80 text-center text-xs space-y-2`}>
                <p className="font-serif font-bold tracking-widest text-sm">品管巡航報 / 每一頁都是生活的詩</p>
                <div className="flex justify-center space-x-4 pt-4 text-stone-500">
                  {!isAdmin ? (
                    <span onClick={() => setShowLoginModal(true)} className="hover:text-amber-500 cursor-pointer flex items-center gap-1 text-xs font-semibold"><Icon name="lock" className="w-3.5 h-3.5" /> 管理者登入</span>
                  ) : (
                    <span onClick={handleAdminLogout} className="hover:text-rose-500 cursor-pointer flex items-center gap-1 text-xs font-semibold"><Icon name="unlock" className="w-3.5 h-3.5 text-emerald-500" /> 登出後台</span>
                  )}
                  <span>•</span>
                  <span className="hover:text-amber-500 cursor-pointer" onClick={() => triggerToast("系統由品管中心運營維護 🛰️")}>聯絡系統管理員</span>
                </div>
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
